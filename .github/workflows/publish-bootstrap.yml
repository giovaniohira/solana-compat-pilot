# Run ONCE to create the package on the Codemod registry (so it appears in the
# Trusted Publisher dropdown). Requires repo secret CODEMOD_API_KEY.
name: Publish Codemod (bootstrap - API key once)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Publish with API key
        env:
          CODEMOD_API_KEY: ${{ secrets.CODEMOD_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${CODEMOD_API_KEY}" ]; then
            echo "::error::Repo secret CODEMOD_API_KEY is missing. GitHub repo → Settings → Secrets and variables → Actions → New repository secret. Value = key from https://go.codemod.com/api-keys (Publish permission)."
            exit 1
          fi
          # API keys require `login --api-key`; CODEMOD_AUTH_TOKEN is for OIDC (publish-codemod.yml).
          npx codemod@latest login --api-key "${CODEMOD_API_KEY}"
          npx codemod@latest whoami
          npx codemod@latest publish .
