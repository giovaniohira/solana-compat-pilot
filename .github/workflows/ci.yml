name: CI

on:
  push:
  pull_request:

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - name: JSSG fixture pair count
        run: npm run fixtures:count
      - run: npm run validate
      # Note: workflow.yaml contains an optional Codemod Cloud AI follow-up path.
      # This CI validates deterministic workflow syntax only; AI execution is manual/platform-run.
      - run: npm run audit
