# Publishes this package to https://app.codemod.com — requires a Trusted Publisher
# configured for repo + package name (see docs/REGISTRY_PUBLISH.md).
#
# If this job fails: open the run log for "Publish to Codemod Registry". Typical
# causes — (1) Trusted Publisher not added yet, (2) wrong workflow path in Codemod
# UI (must be .github/workflows/publish-codemod.yml), (3) repo owner/name typo.
name: Publish Codemod

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publish to Codemod Registry
        uses: codemod/publish-action@v1
        with:
          # Must match Trusted Publisher + OIDC audience in Codemod dashboard.
          registry: "https://app.codemod.com"
