# Publishes this package to https://app.codemod.com — requires a Trusted Publisher
# configured for repo + package name (see docs/REGISTRY_PUBLISH.md).
name: Publish Codemod

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publish to Codemod Registry
        uses: codemod/publish-action@v1
        with:
          registry: "https://app.codemod.com"
